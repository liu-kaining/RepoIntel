<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .Title }}{{ .Title }} · {{ end }}{{ .Site.Title }}</title>
    <meta name="description" content="{{ .Site.Params.description }}">
    <style>
      :root { color-scheme: light dark; --max: 920px; }
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; line-height: 1.7; }
      header, main, footer { max-width: var(--max); margin: 0 auto; padding: 24px; }
      header { border-bottom: 1px solid #ddd; }
      article { margin: 32px 0; }
      a { color: #2563eb; text-decoration: none; }
      a:hover { text-decoration: underline; }
      code, pre { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      table { border-collapse: collapse; width: 100%; }
      th, td { border: 1px solid #ddd; padding: 8px; }
      .meta { color: #666; font-size: 0.92rem; }
      .score { font-weight: 700; }
      .search { margin: 16px 0 24px; }
    </style>
    <link href="{{ "pagefind/pagefind-ui.css" | relURL }}" rel="stylesheet">
  </head>
  <body>
    <header>
      <h1><a href="{{ .Site.BaseURL }}">{{ .Site.Title }}</a></h1>
      <p>{{ .Site.Params.description }}</p>
      <div class="search" id="search"></div>
      <p><a href="{{ "index.xml" | relURL }}">RSS</a></p>
    </header>
    <main>{{ block "main" . }}{{ end }}</main>
    <footer><p>宁缺毋滥，去伪存真。</p></footer>
    <script src="{{ "pagefind/pagefind-ui.js" | relURL }}"></script>
    <script>
      window.addEventListener("DOMContentLoaded", function () {
        if (typeof PagefindUI !== "undefined") {
          new PagefindUI({ element: "#search", showSubResults: true });
        }
      });
    </script>
</html>
