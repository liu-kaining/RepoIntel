{{ define "main" }}
  {{ range .Pages.ByDate.Reverse }}
    <article>
      <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
      <p class="meta">{{ .Date.Format "2006-01-02" }} · Score: <span class="score">{{ .Params.intel_score }}</span></p>
      <p>{{ .Params.summary }}</p>
      <p>
        {{ range .Params.tags }}<a href="{{ (printf "tags/%s" .) | urlize | relURL }}">#{{ . }}</a> {{ end }}
      </p>
    </article>
  {{ else }}
    <p>暂无情报。Pipeline 运行后会自动生成内容。</p>
  {{ end }}
{{ end }}
