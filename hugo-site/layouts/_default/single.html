{{ define "main" }}
  <article>
    <h1>{{ .Title }}</h1>
    <p class="meta">{{ .Date.Format "2006-01-02 15:04" }} · Score: <span class="score">{{ .Params.intel_score }}</span></p>
    <p><a href="{{ .Params.repo_link }}" target="_blank" rel="noopener">GitHub Repository</a></p>
    {{ .Content }}
  </article>
{{ end }}
